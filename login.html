<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - CBTis 258</title>
    <style>
        :root { --vino: #611232; --bg: #F5F5F5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 50px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 8px solid var(--vino); }
        h1 { color: var(--vino); margin: 0 0 10px 0; font-size: 28px; }
        p { color: #666; margin-bottom: 30px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: bold; color: var(--vino); text-transform: uppercase; margin-bottom: 5px; }
        input, select { width: 100%; padding: 14px; border: 1px solid #DDD; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-vino { width: 100%; padding: 16px; background: white; color: var(--vino); border: 2px solid var(--vino); border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 15px; }
        .btn-vino:hover { background: var(--vino); color: white; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>CBTis 258</h1>
        <p>Sistema de Inventario y Control</p>
        <form action="index.html">
            <div class="input-group">
                <label>Tipo de Usuario</label>
                <select required>
                    <option value="">Seleccione perfil...</option>
                    <option>Administrador / Almacén</option>
                    <option>Docente</option>
                    <option>Alumno</option>
                </select>
            </div>
            <div class="input-group">
                <label>Usuario / Matrícula</label>
                <input type="text" placeholder="Ingrese su identificador" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-vino">INICIAR SESIÓN</button>
        </form>
    </div>
</body>
</html>
