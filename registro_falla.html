<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Folio - CBTis 258</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #FFF9F3; padding: 40px; margin: 0; }
        .box { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: span 2; }
        label { font-weight: bold; color: #8D6E63; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #F0F0F0; box-sizing: border-box; margin-top: 5px; }
        .btn { width: 100%; padding: 20px; background: #FFB38E; border: none; color: white; font-weight: bold; border-radius: 15px; cursor: pointer; margin-top: 20px; }
        .btn:hover { background: #E67E22; }
    </style>
</head>
<body>
    <div class="box">
        <a href="index.html" style="color:#A08070; text-decoration:none">← Volver</a>
        <h2 style="color:#E67E22">Registrar Falla (Folio)</h2>
        <form class="grid">
            <div><label>Reportado por</label><input type="text"></div>
            <div><label>N. Serie</label><input type="text"></div>
            <div><label>Motivo</label><input type="text"></div>
            <div><label>Laboratorio</label><select><option>Lab 1</option><option>Lab 2</option><option>Lab 3</option></select></div>
            <div class="full"><label>Descripción de la falla</label><textarea rows="3"></textarea></div>
            <div><label>Urgencia</label><select><option>Baja</option><option>Media</option><option>Alta</option></select></div>
            <div><label>Estado</label><select><option>Falla</option><option>Mantenimiento</option></select></div>
            <button class="btn" type="button" onclick="location.href='index.html'">GUARDAR REPORTE</button>
        </form>
    </div>
</body>

</html>
