<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte - CBTis 258</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #FFF9F3; padding: 40px; margin: 0; }
        .box { max-width: 1100px; margin: auto; background: white; padding: 40px; border-radius: 30px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { flex: 1; padding: 30px; border-radius: 20px; text-align: center; color: white; }
        .c1 { background: #FFB38E; } .c2 { background: #F9E2AF; color: #5D4037; } .c3 { background: #AEC6CF; }
    </style>
</head>
<body>
    <div class="box">
        <a href="index.html" style="text-decoration:none; color:#A08070">← Volver</a>
        <h2 style="color:#5D4037">Reporte General de Activos</h2>
        <div class="stats">
            <div class="card c1"><h3>120</h3><p>Total Activos</p></div>
            <div class="card c2"><h3>85%</h3><p>Operativos</p></div>
            <div class="card c3"><h3>15</h3><p>En Reparación</p></div>
        </div>
        <button onclick="window.print()" style="padding:15px; cursor:pointer; background:#5D4037; color:white; border:none; border-radius:10px;">🖨️ Descargar PDF</button>
    </div>
</body>
</html>
