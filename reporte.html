<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generar Reporte - CBTis 258</title>
    <style>
        :root { --vino: #611232; }
        body { font-family: 'Segoe UI', sans-serif; background: #F5F5F5; padding: 40px; margin: 0; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 40px; border-radius: 15px; }
        .back-link { text-decoration: none; color: #A08070; font-weight: bold; margin-bottom: 20px; display: inline-block; }
        .filter-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; background: #FDF2F5; padding: 20px; border-radius: 10px; }
        label { font-weight: bold; color: var(--vino); font-size: 13px; display: block; margin-bottom: 5px; }
        select[multiple] { width: 100%; height: 80px; border: 1px solid #DDD; border-radius: 5px; }
        
        .stats-grid { margin: 30px 0; }
        .stat-card { border: 1px solid #EEE; padding: 15px; margin-bottom: 10px; text-align: center; border-radius: 8px; }
        .stat-card span { display: block; font-size: 12px; color: #666; text-transform: uppercase; }
        .stat-card b { font-size: 24px; color: var(--vino); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--vino); font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #EEE; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Regresar</a>
        <h2 style="text-align:center; color:var(--vino);">Sistema de Inventario - Generar Reporte</h2>
        
        <div class="filter-section">
            <div>
                <label>Laboratorios:</label>
                <select multiple>
                    <option>Laboratorio 1</option>
                    <option>Laboratorio 2</option>
                    <option>Laboratorio 3</option>
                </select>
            </div>
            <div>
                <label>Estado:</label>
                <select multiple>
                    <option>Funcional</option>
                    <option>Mantenimiento</option>
                    <option>Falla</option>
                    <option>Extravío</option>
                </select>
            </div>
            <div>
                <label>Tipo de equipo:</label>
                <select multiple>
                    <option>PC</option>
                    <option>Monitor</option>
                    <option>Mouse</option>
                    <option>Teclado</option>
                    <option>Otro</option>
                </select>
            </div>
            <div style="grid-column: span 3; text-align: right;">
                <button style="padding:10px 30px; background:var(--vino); color:white; border:none; border-radius:5px; cursor:pointer;">Aplicar Filtro</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><span>Total de Activos</span><b>100</b></div>
            <div class="stat-card"><span>Equipos</span><b>85%</b></div>
            <div class="stat-card"><span>Equipos en Falla</span><b>15</b></div>
        </div>

        <table>
            <thead>
                <tr><th>Num Serie</th><th>Último Reporte</th><th>Responsable</th><th>Ubicación</th></tr>
            </thead>
            <tbody>
                <tr><td>143</td><td>2022-10-02</td><td>Almacen</td><td>Lab 3</td></tr>
                <tr><td>110</td><td>2023-01-05</td><td>Soporte</td><td>Lab 1</td></tr>
            </tbody>
        </table>
    </div>
</body>
</html>
