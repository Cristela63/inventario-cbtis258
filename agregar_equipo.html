<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Registro Nuevo Activo</title>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="btn btn-secondary">Regresar</a>
            <h2>Registro de Nuevo Activo</h2>
        </header>

        <div class="form-grid" style="background: white; padding: 20px; border-radius: 15px;">
            <div><label>Tipo de Equipo:</label><select><option>Monitor</option><option>PC</option></select></div>
            <div><label>Ubicación:</label><select><option>Laboratorio 1</option></select></div>
            <div><label>Marca:</label><input type="text"></div>
            <div><label>Estado:</label><select><option>Funcional</option><option>Mantenimiento</option></select></div>
            <div><label>Fecha de Registro:</label><input type="date"></div>
            <div style="grid-column: span 2; text-align: center; margin-top: 20px;">
                <button class="btn btn-primary" style="padding: 15px 40px;">💾 GUARDAR</button>
            </div>
        </div>
    </div>
</body>
</html>
