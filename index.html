<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CBTis 258</title>
    <style>
        :root { --bg: #FFF9F3; --text: #5D4037; --warm-1: #FFB38E; --warm-2: #AEC6CF; --warm-3: #E2F0CB; --warm-4: #F9E2AF; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        .nav { background: white; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .container { padding: 40px 5%; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 40px; border-radius: 25px; text-decoration: none; text-align: center; font-weight: bold; color: var(--text); transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.02); }
        .card:hover { transform: translateY(-10px); }
        .c1 { border-bottom: 6px solid var(--warm-1); } .c2 { border-bottom: 6px solid var(--warm-2); }
        .c3 { border-bottom: 6px solid var(--warm-3); } .c4 { border-bottom: 6px solid var(--warm-4); }
        .table-box { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: #A08070; border-bottom: 2px solid var(--bg); }
        td { padding: 15px; border-bottom: 1px solid #FDF5F0; }
        tr:hover { background: #FFF9F3; cursor: pointer; }
    </style>
</head>
<body>
    <div class="nav">
        <h2>CBTis 258</h2>
        <div><b>Sesión: Almacén</b> | <a href="login.html" style="color:var(--text)">Salir</a></div>
    </div>
    <div class="container">
        <div class="grid">
            <a href="registro_falla.html" class="card c1"><span style="font-size:30px">📝</span><br>Registrar Falla</a>
            <a href="nuevo_activo.html" class="card c2"><span style="font-size:30px">➕</span><br>Agregar Equipo</a>
            <a href="detalle.html" class="card c3"><span style="font-size:30px">🔍</span><br>Detalle de Equipo</a>
            <a href="reporte.html" class="card c4"><span style="font-size:30px">📊</span><br>Generar Reporte</a>
        </div>
        <div class="table-box">
            <h3>Inventario Reciente</h3>
            <table>
                <thead><tr><th>Equipo</th><th>Serie</th><th>Ubicación</th><th>Estado</th></tr></thead>
                <tbody>
                    <tr onclick="location.href='detalle.html'"><td>Monitor HP</td><td>143</td><td>Lab 3</td><td style="color:#E67E22">Falla</td></tr>
                    <tr><td>PC Dell</td><td>110</td><td>Lab 1</td><td style="color:#27AE60">Funcional</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
