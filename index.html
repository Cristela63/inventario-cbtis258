<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario CBTis 258</title>

<style>

:root{
--rojo:#8E1B1B;
--gris-fondo:#F4F4F4;
--gris:#E0E0E0;
--texto:#444;
--blanco:#FFF;
}

body{
font-family: "Segoe UI", sans-serif;
background:var(--gris-fondo);
margin:0;
display:flex;
justify-content:center;
padding:20px;
color:var(--texto);
}

.app-container{
width:100%;
max-width:500px;
background:var(--blanco);
border-radius:12px;
border:1px solid var(--gris);
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.header{
padding:15px;
border-bottom:1px solid var(--gris);
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
}

.title{
text-align:center;
padding:10px;
font-weight:600;
}

.search{
padding:15px;
display:flex;
gap:8px;
}

input{
flex:1;
padding:8px;
border:1px solid var(--gris);
border-radius:6px;
}

button{
padding:8px 12px;
border:1px solid var(--gris);
background:var(--blanco);
border-radius:6px;
cursor:pointer;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:15px;
}

.menu a{
border:1px solid var(--gris);
padding:12px;
text-align:center;
border-radius:8px;
text-decoration:none;
color:var(--texto);
font-size:14px;
}

.menu a:hover{
border-color:var(--rojo);
color:var(--rojo);
}

.table{
padding:15px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th{
text-align:left;
background:var(--gris);
padding:8px;
}

td{
padding:8px;
border-bottom:1px solid var(--gris);
}

.estado-falla{
color:#C62828;
font-weight:600;
}

.estado-ok{
color:#2E7D32;
font-weight:600;
}

</style>
</head>

<body>

<div class="app-container">

<div class="header">
<button>Cerrar sesión</button>
<span>Usuario: Almacén</span>
</div>

<div class="title">
Sistema de Inventario - CBTis258
</div>

<div class="search">
<input type="text" placeholder="Buscar equipo">
<button>Buscar</button>
</div>

<div class="menu">

<a href="registro_falla.html">Registrar falla</a>
<a href="nuevo_activo.html">Agregar equipo</a>
<a href="detalle.html">Detalle de equipo</a>
<a href="reporte.html">Generar reporte</a>

</div>

<div class="table">

<table>

<tr>
<th>ID</th>
<th>Tipo</th>
<th>Serie</th>
<th>Estado</th>
</tr>

<tr>
<td>1</td>
<td>Monitor</td>
<td>143</td>
<td class="estado-falla">Falla</td>
</tr>

<tr>
<td>2</td>
<td>PC</td>
<td>110</td>
<td class="estado-ok">Funcional</td>
</tr>

</table>

</div>

</div>

</body>
</html>
